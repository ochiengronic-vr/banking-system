<!DOCTYPE html>
<html>
<head>
<title>ROCKY ONLINE BANK</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,40,.7),rgba(0,0,40,.7)),
    url("your-background.jpg");
    background-size:cover;
    background-position:center;
    color:white;
}


/* HEADER */

.header{
    background:rgba(0,51,102,.9);
    padding:25px;
    text-align:center;
    box-shadow:0 5px 15px black;
}


/* LOGIN */

.login-box,
.dashboard{

    width:380px;
    margin:60px auto;
    padding:30px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    box-shadow:0 0 25px black;

}


h2{
    text-align:center;
    margin-bottom:20px;
}


input{

    width:100%;
    padding:14px;
    margin:12px 0;
    border:none;
    border-radius:8px;
    outline:none;

}


button{

    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:8px;
    background:#00e676;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;

}


button:hover{

    background:#00bfa5;
    transform:scale(1.05);

}


/* DASHBOARD */


.dashboard{

    display:none;

}


.card{

    background:linear-gradient(135deg,#003366,#00bfa5);
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;

}


.balance{

    font-size:40px;
    margin-top:10px;

}


.menu{

    margin-top:20px;

}


a{

color:#00e676;
text-decoration:none;

}

</style>

</head>


<body>


<div class="header">

<h1>🏦 ROCKY ONLINE BANK</h1>

<p>Secure Digital Banking System</p>

</div>



<div class="login-box" id="login">


<h2>🔐 Login</h2>


<input id="username" placeholder="Username">


<input id="password" type="password" placeholder="Password">


<button onclick="login()">Sign In</button>


<p id="message"></p>


<br>

<a href="https://ochiengronic-vr.github.io/.github.io/">
@ ROCKY
</a>


</div>




<div class="dashboard" id="dashboard">


<h2>Welcome ROCKY 👋</h2>


<div class="card">


<h3>Account Balance</h3>


<div class="balance">
$5,000
</div>


</div>



<div class="menu">


<button onclick="deposit()">
💰 Deposit Money
</button>


<button onclick="withdraw()">
💳 Withdraw Money
</button>


<button onclick="logout()">
🚪 Logout
</button>


</div>


</div>




<script>


function login(){


let user=document.getElementById("username").value;

let pass=document.getElementById("password").value;



if(user=="rocky" && pass=="1234"){


document.getElementById("login").style.display="none";

document.getElementById("dashboard").style.display="block";


}

else{


document.getElementById("message").innerHTML=
"❌ Wrong username or password";


}


}




function deposit(){

alert("Deposit feature coming soon 💰");

}



function withdraw(){

alert("Withdraw feature coming soon 💳");

}



function logout(){

location.reload();

}


</script>


</body>
</html>
