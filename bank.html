<!DOCTYPE html>
<html>
<head>

<title>ROCKY ONLINE BANK</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,40,.7),rgba(0,0,40,.7)),
    url("background.jpg");
    background-size:cover;
    background-position:center;
    color:white;
}


/* HEADER */

.header{
    background:rgba(0,51,102,.9);
    padding:25px;
    text-align:center;
    box-shadow:0 5px 15px black;
}


/* LOGIN + DASHBOARD */

.login-box,
.dashboard{

    width:90%;
    max-width:380px;
    margin:40px auto;
    padding:30px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    box-shadow:0 0 25px black;

}


h2{
    text-align:center;
    margin-bottom:20px;
}


input{

    width:100%;
    padding:14px;
    margin:12px 0;
    border:none;
    border-radius:8px;
    outline:none;

}


/* BUTTONS */

button{

    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:8px;
    background:#00e676;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;

}


button:hover{

    background:#00bfa5;
    color:white;

}


button:active{

    background:red;

}



.card{

    background:linear-gradient(135deg,#003366,#00bfa5);
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;

}


.balance{

    font-size:40px;
    margin-top:10px;

}


a{
    color:#00e676;
    text-decoration:none;
}


.menu{
    margin-top:20px;
}


</style>

</head>


<body>


<div class="header">

<h1>🏦 ROCKY ONLINE BANK</h1>

<p>Secure Digital Banking System</p>

</div>



<div class="login-box">


<h2>🔐 Login</h2>


<input placeholder="Username">


<input type="password" placeholder="Password">


<button>
Sign In
</button>


<br><br>


<p>
Help click >>>
<a href="https://ochiengronic-vr.github.io/.github.io/" target="_blank">
@ ROCKY
</a>
</p>


<p>
Open account and withdraw
</p>


</div>





<div class="dashboard">


<h2>
Welcome ROCKY 👋
</h2>



<div class="card">


<h3>
Account Balance
</h3>


<div class="balance">
Ksh 75,000
</div>


</div>



<div class="menu">


<button>
💰 Deposit Money
</button>


<button>
💳 Withdraw Money
</button>


<button>
🚪 Logout
</button>


</div>


</div>



<script>

document.querySelector("button").onclick=function(){

alert("Login clicked");

}

</script>


</body>
</html>
